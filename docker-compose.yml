services:
  db:
    image: pgvector/pgvector:pg17
    container_name: actually-relevant-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: actually_relevant_dev
      POSTGRES_USER: ardev
      POSTGRES_PASSWORD: ardev_local
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
