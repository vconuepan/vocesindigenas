services:
  - type: web
    name: vocesindigenas-backend
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vocesindigenas-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://vocesindigenas-frontend.onrender.com
      - key: LOG_LEVEL
        value: info

  - type: web
    name: vocesindigenas-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://vocesindigenas-backend.onrender.com
    routes:
      - type: rewrite
        source: /sitemap.xml
        destination: https://vocesindigenas-backend.onrender.com/api/sitemap.xml
      - type: rewrite
        source: /api/podcast/*
        destination: https://vocesindigenas-backend.onrender.com/api/podcast/:splat
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: vocesindigenas-db
    plan: basic-256mb
    databaseName: vocesindigenas_db
    user: vocesindigenas_db_user
